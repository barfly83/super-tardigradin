<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Tardigrado Platform – Mostri più piccoli</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
  <style>
    body { margin: 0; background: #000; }
    canvas { display: block; margin: auto; }
  </style>
</head>
<body>
<script>
class MainScene extends Phaser.Scene {
  constructor() { super('MainScene'); }

  preload() {
    this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
    this.load.image('enemy', 'mostro.png'); 
    this.load.image('star', 'https://labs.phaser.io/assets/demoscene/star.png');
    this.load.image('playerR', 'tardigrado_R.png');
    this.load.image('playerL', 'tardigrado_L.png');
  }

  init(data) {
    this.lives = data.lives ?? 3;
    this.score = data.score ?? 0;
  }

  create() {
    this.physics.world.gravity.y = 900;
    this.levelWidth = 3000;

    // --- PIATTAFORME ---
    this.platforms = this.physics.add.staticGroup();
    for (let x = 0; x < this.levelWidth; x += 400)
      this.platforms.create(x, 580, 'ground').setScale(2).refreshBody();
    this.platforms.create(600, 450, 'ground');
    this.platforms.create(900, 350, 'ground');
    this.platforms.create(1300, 250, 'ground');
    this.platforms.create(1700, 400, 'ground');
    this.platforms.create(2200, 300, 'ground');
    this.platforms.create(2600, 200, 'ground');

    // --- GIOCATORE ---
    this.player = this.physics.add.sprite(100, 450, 'playerR');
    this.player.setScale(0.6);
    this.player.setBounce(0.1);
    this.player.setCollideWorldBounds(true);
    this.player.facing = 'right';
    this.player.invulnerable = false;
    this.physics.add.collider(this.player, this.platforms);
    this.player.body.setSize(this.player.width * 0.6, this.player.height * 0.8);

    this.cursors = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

	// --- NEMICI ---
this.enemies = this.physics.add.group();

// Posizioniamo i nemici solo sulle piattaforme alte
// Indici piattaforme alte: 8, 9, 10, 11, 12
const enemyData = [
  { x: 900, platformIndex: 8 },
  { x: 1300, platformIndex: 9 },
  { x: 1700, platformIndex: 10 },
  { x: 2200, platformIndex: 11 },
  { x: 2600, platformIndex: 12 }
];

enemyData.forEach(d => {
  let platform = this.platforms.getChildren()[d.platformIndex];
  if (!platform) return; // sicurezza
  let e = this.enemies.create(d.x, platform.y, 'enemy');
  e.setScale(0.07);
  e.body.setSize(e.width * 0.6, e.height * 0.6);
  e.y = platform.y - (e.displayHeight / 2); // sopra la piattaforma
  e.setCollideWorldBounds(true);
  e.setBounce(0, 0);
  e.setVelocityX(100);
});

this.physics.add.collider(this.enemies, this.platforms);
this.physics.add.overlap(this.player, this.enemies, this.playerVsEnemy, null, this);

    // --- STELLE ---
    this.stars = this.physics.add.group({
      key: 'star',
      repeat: 20,
      setXY: { x: 100, y: 0, stepX: 130 }
    });
    this.stars.children.iterate(s => s.setBounceY(Phaser.Math.FloatBetween(0.4, 0.8)));
    this.physics.add.collider(this.stars, this.platforms);
    this.physics.add.overlap(this.player, this.stars, this.collectStar, null, this);

    // --- UI ---
    this.uiText = this.add.text(16, 16, '', { fontSize: '20px', fill: '#fff' }).setScrollFactor(0);
    this.updateUI();

    // --- CAMERA ---
    this.cameras.main.setBounds(0, 0, this.levelWidth, 600);
    this.physics.world.setBounds(0, 0, this.levelWidth, 600);
    this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
  }

 update() {
  const p = this.player.body;
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];

  let pad = null;
  for (let gp of pads) if (gp && gp.connected) { pad = gp; break; }

  let left = this.cursors.left.isDown;
  let right = this.cursors.right.isDown;
  let jump = this.spaceKey.isDown;

  // --- Gamepad: mappa assi e pulsanti ---
  if (pad) {
    const axisX = pad.axes[0]; // -1 sinistra, +1 destra
    if (axisX < -0.3) left = true;
    else if (axisX > 0.3) right = true;

    // Bottone B 
    if (pad.buttons[2].pressed) jump = true;
  }

  // --- Movimento giocatore ---
  if (left) {
    p.setVelocityX(-220);
    if (this.player.facing !== 'left') {
      this.player.setTexture('playerL');
      this.player.facing = 'left';
    }
  } else if (right) {
    p.setVelocityX(220);
    if (this.player.facing !== 'right') {
      this.player.setTexture('playerR');
      this.player.facing = 'right';
    }
  } else {
    p.setVelocityX(0);
  }

  if (jump && p.blocked.down) {
    p.setVelocityY(-450);
  }

  // --- Movimento automatico nemici ---
  this.enemies.children.iterate(e => {
    if (e.body.blocked.left) e.setVelocityX(100);
    else if (e.body.blocked.right) e.setVelocityX(-100);
  });
}


  collectStar(player, star) {
    star.disableBody(true, true);
    this.score += 10;
    this.updateUI();
  }

  updateUI() {
    this.uiText.setText('❤️ ' + this.lives + '   ⭐ ' + this.score);
  }

  playerVsEnemy(player, enemy) {
    if (player.invulnerable) return;

    const pb = player.body;
    const eb = enemy.body;
    const playerAbove = pb.velocity.y > 0 && pb.bottom <= eb.top + 10;

    if (playerAbove) {
      enemy.setTint(0xff0000);
      enemy.body.enable = false;
      this.tweens.add({
        targets: enemy,
        alpha: 0,
        duration: 400,
        onComplete: () => enemy.destroy()
      });
      pb.setVelocityY(-300);
      this.score += 50;
      this.updateUI();
    } else {
      player.invulnerable = true;
      this.lives--;
      this.updateUI();
      player.setTint(0xff8888);
      player.body.enable = false;
      this.cameras.main.shake(150, 0.01);

      if (this.lives > 0) {
        const respawnX = player.x;
        const respawnY = player.y;

        this.time.delayedCall(800, () => {
          player.clearTint();
          player.body.enable = true;
          player.setPosition(respawnX, respawnY - 20);
          player.invulnerable = false;
        });
      } else {
        this.time.delayedCall(800, () => {
          this.scene.start('GameOver', { score: this.score });
        });
      }
    }
  }
}

class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOver'); }

  create(data) {
    this.add.text(400, 250, 'GAME OVER', { fontSize: '40px', fill: '#ff4444' }).setOrigin(0.5);
    this.add.text(400, 320, 'Punteggio: ' + data.score, { fontSize: '24px', fill: '#fff' }).setOrigin(0.5);
    this.add.text(400, 400, 'Premi SPAZIO per ricominciare', { fontSize: '20px', fill: '#aaa' }).setOrigin(0.5);

    this.input.keyboard.once('keydown-SPACE', () => {
      this.scene.start('MainScene', { lives: 3, score: 0 });
    });
  }
}

const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  physics: { default: 'arcade', arcade: { debug: false } },
  scene: [MainScene, GameOverScene]
};

new Phaser.Game(config);
</script>
</body>
</html>
