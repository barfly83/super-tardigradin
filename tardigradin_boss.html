<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Super Tardigradin</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
  <style>
    body { margin: 0; background: #000; }
    canvas { display: block; margin: auto; }
  </style>
</head>
<body>
<script>
// ======================================================
// BOOT SCENE
// ======================================================
class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }

  preload() {
    this.load.audio('jump', 'boing.wav');
    this.load.audio('victory', 'victory.wav');
    this.load.audio('gameover', 'gameover.wav');
    this.load.audio('start', 'start.wav');
    this.load.audio('star', 'star.wav');
    this.load.audio('death', 'death.wav');
    this.load.audio('enemy', 'enemy.wav');
  }

  create() {
    this.cameras.main.setBackgroundColor('#001122');
    this.add.text(this.scale.width/2, 200, '🦠 SUPER TARDIGRADIN 🦠',
      { fontSize:'48px', fill:'#00ffcc', stroke:'#003333', strokeThickness:5 }
    ).setOrigin(0.5);

    const startText = this.add.text(this.scale.width/2, 350,
      'Clicca o premi un tasto per iniziare',
      { fontSize:'22px', fill:'#fff' }
    ).setOrigin(0.5);

    this.tweens.add({
      targets: startText,
      alpha: { from:1, to:0.3 },
      yoyo:true, repeat:-1, duration:1000
    });

    const unlockAudio = () => {
      if (this.sound.context.state === 'suspended') this.sound.context.resume();
      this.sound.play('start');
      this.scene.start('MainScene');
    };

    this.input.once('pointerdown', unlockAudio);
    this.input.keyboard.once('keydown', unlockAudio);
  }
}


// ======================================================
// MAIN SCENE
// ======================================================
class MainScene extends Phaser.Scene {
  constructor() { super('MainScene'); }

  preload() {

    this.load.image('sky', 'sky.png');
    this.load.image('ground', 'platform_v1.png');
    this.load.image('star', 'star.png');
    this.load.image('bullet', 'bullet.png');

    // Player
    this.load.image('playerR', 'tardigrado_R_00.png');
    this.load.image('playerL', 'tardigrado_L_00.png');
    this.load.image('playerR_walk1', 'tardigrado_R_01.png');
    this.load.image('playerR_walk2', 'tardigrado_R_02.png');
    this.load.image('playerL_walk1', 'tardigrado_L_01.png');
    this.load.image('playerL_walk2', 'tardigrado_L_02.png');

    // Boss (8 vite → boss08 → boss01)
    for (let i = 1; i <= 8; i++) {
      const n = String(i).padStart(2, '0');
      this.load.image('boss'+n, `boss${n}.png`);
    }
  }

  init(data) {
    this.lives = data.lives ?? 3;
    this.score = data.score ?? 0;
  }

  create() {
    // ------------------------------------------------------
    // Sfondo e fisica
    // ------------------------------------------------------
    const bg = this.add.image(0,0,'sky').setOrigin(0).setScrollFactor(0);
    bg.displayWidth = this.scale.width;
    bg.displayHeight = this.scale.height;
    bg.setDepth(-10);

    this.physics.world.gravity.y = 900;
    this.levelWidth = 3000;

    // Suoni
    this.jumpSound = this.sound.add('jump');
    this.victorySound = this.sound.add('victory');
    this.starSound = this.sound.add('star');
    this.deathSound = this.sound.add('death');
    this.enemySound = this.sound.add('enemy');

    // ------------------------------------------------------
    // SOLO piattaforma principale (alte rimosse)
    // ------------------------------------------------------
    this.platforms = this.physics.add.staticGroup();
    for (let x = 0; x < this.levelWidth; x += 400)
      this.platforms.create(x, 580, 'ground').setScale(2).refreshBody();

    const groundPlatform = this.platforms.getChildren()[0];
    const groundTop = groundPlatform.y - groundPlatform.displayHeight/2;

    // ------------------------------------------------------
    // Player
    // ------------------------------------------------------
    this.player = this.physics.add.sprite(100, 0, 'playerR');
    this.player.setScale(0.6);
    this.player.setBounce(0.1);
    this.player.setCollideWorldBounds(true);
    this.player.facing = 'right';

    const bodyWidth = 60 * 0.6;
    const bodyHeight = 90 * 0.6;
    this.player.body.setSize(bodyWidth, bodyHeight);
    this.player.body.setOffset(20*0.6, 20*0.6);
    this.player.y = groundTop - bodyHeight / 2;

    this.physics.add.collider(this.player, this.platforms);

    this.anims.create({ key:'walkR', frames:[{key:'playerR_walk1'}, {key:'playerR_walk2'}], frameRate:6, repeat:-1 });
    this.anims.create({ key:'walkL', frames:[{key:'playerL_walk1'}, {key:'playerL_walk2'}], frameRate:6, repeat:-1 });

    // Controlli
    this.cursors = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.fireKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ALT);

    // ------------------------------------------------------
    // Proiettili
    // ------------------------------------------------------
    this.bullets = this.physics.add.group();
    this.lastFired = 0;

    // ------------------------------------------------------
    // **BOSS**
    // ------------------------------------------------------
    this.bossLives = 8;  
    this.boss = this.physics.add.sprite(2400, groundTop - 80, 'boss08');
    this.boss.setScale(0.5);
    this.boss.setCollideWorldBounds(true);
    this.boss.body.allowGravity = false;

    // Pulsazione boss
    this.tweens.add({
      targets: this.boss,
      scaleX: 0.55,
      scaleY: 0.55,
      yoyo: true,
      repeat: -1,
      duration: 700,
      ease: 'Sine.easeInOut'
    });

    this.physics.add.overlap(this.bullets, this.boss, this.bulletHitsBoss, null, this);
    this.physics.add.overlap(this.player, this.boss, this.playerVsBoss, null, this);

    // ------------------------------------------------------
    // Stelle
    // ------------------------------------------------------
    this.stars = this.physics.add.group({ key:'star', repeat:20, setXY:{x:100,y:0,stepX:130} });
    this.stars.children.iterate(s => s.setBounceY(Phaser.Math.FloatBetween(0.4,0.8)));
    this.physics.add.collider(this.stars, this.platforms);
    this.physics.add.overlap(this.player, this.stars, this.collectStar, null, this);

    // UI
    this.uiText = this.add.text(16,16,'',{fontSize:'20px',fill:'#fff'}).setScrollFactor(0).setDepth(100);
    this.updateUI();

    // Camera
    this.cameras.main.setBounds(0,0,this.levelWidth,this.scale.height);
    this.physics.world.setBounds(0,0,this.levelWidth,this.scale.height);
    this.cameras.main.startFollow(this.player, true, 0.08,0.08);
  }


  // ============================================================
  // UPDATE
  // ============================================================
  update() {
    const p = this.player.body;

    let left = this.cursors.left.isDown;
    let right = this.cursors.right.isDown;
    let jump = this.spaceKey.isDown;
    let fire = this.fireKey.isDown;

    // Movimento
    if (left) {
      p.setVelocityX(-220);
      this.player.facing = 'left';
      if (!this.player.anims.isPlaying || this.player.anims.currentAnim.key !== 'walkL') this.player.play('walkL');
    } else if (right) {
      p.setVelocityX(220);
      this.player.facing = 'right';
      if (!this.player.anims.isPlaying || this.player.anims.currentAnim.key !== 'walkR') this.player.play('walkR');
    } else {
      p.setVelocityX(0);
      this.player.setTexture(this.player.facing === 'right' ? 'playerR' : 'playerL');
    }

    // Salto
    if (jump && p.blocked.down) {
      p.setVelocityY(-500);
      this.jumpSound.play();
    }

    // Sparo
    if (fire && this.time.now > this.lastFired + 300) {
      const dir = this.player.facing === 'right' ? 1 : -1;
      const bullet = this.bullets.create(this.player.x + dir*40, this.player.y, 'bullet');
      bullet.setVelocityX(600*dir);
      bullet.setVelocityY(-150);
      bullet.setScale(0.3);
      bullet.body.allowGravity = true;
      bullet.body.gravity.y = 200;
      this.lastFired = this.time.now;
    }

    // Vittoria (se boss morto)
    if (this.bossLives <= 0 && this.player.x > this.levelWidth - 100) {
      this.victorySound.play();
      this.scene.start('WinScene', { score:this.score });
    }
  }


  // ============================================================
  // RACCOLTA STELLE
  // ============================================================
  collectStar(player, star) {
    star.disableBody(true,true);
    this.starSound.play();
    this.score += 10;
    this.updateUI();
  }

  updateUI() { this.uiText.setText('❤️ '+this.lives+'   ⭐ '+this.score); }


  // ============================================================
  // PLAYER VS BOSS
  // ============================================================
  playerVsBoss(player, boss) {
    if (player.invulnerable) return;

    this.lives--;
    this.deathSound.play();
    this.updateUI();

    this.cameras.main.shake(150,0.01);

    player.invulnerable = true;
    player.setTint(0xff8888);
    player.body.enable = false;

    const px = player.x, py = player.y;
    this.time.delayedCall(800, () => {
      if (this.lives <= 0) {
        this.scene.start('GameOver', { score:this.score });
        return;
      }
      player.clearTint();
      player.body.enable = true;
      player.setPosition(px, py-20);
      player.invulnerable = false;
    });
  }


  // ============================================================
  // PROIETTILE VS BOSS → decrementa vite + cambia sprite
  // ============================================================
  bulletHitsBoss(bullet, boss) {
    bullet.destroy();

    this.bossLives--;
    this.enemySound.play();

    if (this.bossLives > 0) {
      const spriteIndex = String(this.bossLives).padStart(2, '0');
      boss.setTexture('boss'+spriteIndex);
      boss.setTint(0xff0000);
      this.time.delayedCall(100, () => boss.clearTint());
    } else {
      // Boss morto
      this.tweens.add({
        targets: boss,
        alpha:0,
        duration:600,
        onComplete:()=> boss.destroy()
      });
      this.score += 200;
      this.updateUI();
    }
  }
}


// ======================================================
// GAME OVER / WIN
// ======================================================
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOver'); }
  create(data) {
    this.sound.play('gameover');
    this.add.text(this.scale.width/2, 250, '💀 GAME OVER 💀',
      { fontSize:'50px', fill:'#ff4444' }
    ).setOrigin(0.5);

    this.add.text(this.scale.width/2, 320, 'Punteggio: '+data.score,
      { fontSize:'24px', fill:'#fff' }
    ).setOrigin(0.5);

    this.add.text(this.scale.width/2, 400, 'Premi SPAZIO per ricominciare',
      { fontSize:'22px', fill:'#aaa' }
    ).setOrigin(0.5);

    this.input.keyboard.once('keydown-SPACE', () => {
      this.scene.start('MainScene', { lives:3, score:0 });
    });
  }
}

class WinScene extends Phaser.Scene {
  constructor(){ super('WinScene'); }
  create(data){
    this.sound.play('victory');
    this.add.text(this.scale.width/2,250,'🎉 HAI VINTO! 🎉',
      { fontSize:'40px', fill:'#44ff44' }
    ).setOrigin(0.5);

    this.add.text(this.scale.width/2,320,'Punteggio: '+data.score,
      { fontSize:'24px', fill:'#fff' }
    ).setOrigin(0.5);

    this.add.text(this.scale.width/2,400,'Premi SPAZIO per ricominciare',
      { fontSize:'22px', fill:'#aaa' }
    ).setOrigin(0.5);

    this.input.keyboard.once('keydown-SPACE', () => {
      this.scene.start('MainScene', { lives:3, score:0 });
    });
  }
}



// ======================================================
// CONFIG
// ======================================================
const config = {
  type: Phaser.AUTO,
  width: 1600,
  height: 600,
  physics: { default:'arcade', arcade:{ debug:false } },
  scene: [BootScene, MainScene, GameOverScene, WinScene]
};

new Phaser.Game(config);
</script>
</body>
</html>
